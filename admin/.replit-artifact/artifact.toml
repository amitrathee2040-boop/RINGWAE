kind = "web"
previewPath = "/admin"
title = "Ring War Admin"
router = "path"

[[services]]
name = "web"
paths = ["/admin"]
localPort = 23744

[services.development]
run = "pnpm --filter @workspace/admin run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/admin", "run", "build"]
publicDir = "artifacts/admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23744"
BASE_PATH = "/admin"
